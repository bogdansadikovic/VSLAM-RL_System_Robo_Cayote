### ekf config file ###
ekf_filter_node:
    ros__parameters:
        frequency: 30.0
        two_d_mode: false
        publish_tf: true

        map_frame: map
        odom_frame: odom
        base_link_frame: base_link
        world_frame: odom

        # Our WitMotion IMU
        imu0: /imu/data
        
        # Which IMU values should the EKF trust? 
        # [X, Y, Z, roll, pitch, yaw, X_vel, Y_vel, Z_vel, roll_vel, pitch_vel, yaw_vel, X_accel, Y_accel, Z_accel]
        # We only want it to read orientation (roll, pitch, yaw) and rotational velocity for now.
        imu0_config: [false, false, false,
                      true,  true,  true,
                      false, false, false,
                      true,  true,  true,
                      false, false, false]